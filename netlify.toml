# Flagship site (rocketplate) — deployed from repo root.
# The conversion site has its own netlify.toml in gorocketplate/.

# /partner moved to /partners (server-side 301; query string, incl. ?token,
# is preserved by Netlify automatically). partner/index.html remains as a
# client-side fallback only.
[[redirects]]
  from = "/partner/*"
  to = "/partners/:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # CSP: inline script/style are required by the single-file page architecture
    # (ADR-001); the value of this policy is the script-src/connect-src allow-list
    # + frame-ancestors. Tighten to nonces if the pages ever get a build step.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com; media-src 'self'; connect-src 'self' https://uhmyjevtfrynunxfsyof.supabase.co https://www.google-analytics.com https://*.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Fingerprint-free static assets: safe to cache hard because filenames change
# when content meaningfully changes (hero v1→v2 shipped as new files).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
