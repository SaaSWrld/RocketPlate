<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>RocketPlate — Phase 1 Animatic (low-res)</title>
<style>
  :root{ --navy:#0B3468; --launch:#F1502F; --cream:#FFF8EE; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#04101f;color:var(--cream);font-family:"Outfit",system-ui,sans-serif;height:100vh;overflow:hidden}
  #stage{position:fixed;inset:0}
  .frame{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.1s ease}
  .frame.on{opacity:1}
  #caption{
    position:fixed;left:50%;bottom:12%;transform:translateX(-50%);text-align:center;z-index:5;
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:clamp(.8rem,1.6vw,1.05rem);
    letter-spacing:.22em;text-transform:uppercase;color:var(--cream);
    text-shadow:0 2px 18px rgba(3,13,31,.9); white-space:pre-line; line-height:2;
  }
  #caption b{color:var(--launch)}
  #hud{position:fixed;top:16px;left:16px;z-index:5;font-family:ui-monospace,monospace;font-size:.7rem;letter-spacing:.14em;color:#8fa3c0}
  #controls{position:fixed;right:16px;bottom:16px;z-index:6;display:flex;gap:8px}
  button{
    font-family:ui-monospace,monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--cream);background:rgba(255,248,238,.08);border:1px solid rgba(190,204,214,.4);
    border-radius:999px;padding:10px 16px;cursor:pointer;
  }
  button:hover{border-color:#fff}
  #note{position:fixed;top:16px;right:16px;z-index:5;font-size:.7rem;color:#8fa3c0;max-width:300px;text-align:right}
</style>
</head>
<body>
<div id="stage"></div>
<div id="hud">ROCKETPLATE · PHASE 1 ANIMATIC · LOW-RES STYLE FRAMES</div>
<div id="note">Timing = proposed Phase-2 build timing.<br>Captions are live HTML (never baked into video).</div>
<div id="caption"></div>
<div id="controls">
  <button id="prev">◀ Prev</button>
  <button id="pause">Pause</button>
  <button id="next">Next ▶</button>
  <button id="restart">Restart</button>
</div>
<script>
/* Storyboard beats: [frame image, seconds, caption]. Reduced-motion → manual stepping. */
const BEATS = [
  ["frames/f1-earth.webp",          1.6, "ROCKETPLATE MISSION CONTROL\nLOCATING PILOT LAUNCH ZONE"],
  ["frames/f1-earth.webp",          2.4, "SOUTH FLORIDA IDENTIFIED\nLOCAL DINNER NETWORK ONLINE"],
  ["frames/f2-southflorida.webp",   2.0, "SOUTH FLORIDA\nPREPARING FIRST LAUNCH"],
  ["frames/f2-southflorida.webp",   1.5, "MIAMI-DADE ACQUIRED\nPILOT CORRIDOR DETECTED"],
  ["frames/f3-kendall-map.webp",    2.0, "KENDALL LAUNCH ZONE CONFIRMED\nFIRST DELIVERY MISSION PREPARING"],
  ["frames/f4b-rocky-arrival.webp", 2.5, "L.I.F.T.-3.3 ONLINE\nLOCAL KITCHENS DETECTED"],
  ["frames/f5a-lift-cockpit.webp",  2.0, "“South Florida identified. Miami-Dade acquired.\nKendall launch zone confirmed.”"],
  ["frames/f6b-cockpit-portal.webp",1.5, "PREPARING YOUR MISSION MENU"],
  ["frames/f7-food-transition.webp",2.0, "DESTINATION: DELICIOUS"],
];
const stage = document.getElementById("stage"), cap = document.getElementById("caption");
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
const frames = BEATS.map(([src]) => {
  const d = document.createElement("div");
  d.className = "frame"; d.style.backgroundImage = `url(${src})`;
  stage.appendChild(d); return d;
});
let i = -1, timer = null, paused = reduced; /* reduced motion: no auto-advance */
function show(n){
  i = (n + BEATS.length) % BEATS.length;
  frames.forEach((f, k) => f.classList.toggle("on", k === i));
  cap.innerHTML = BEATS[i][2].replace(/\n/g, "<br>");
  clearTimeout(timer);
  if (!paused) timer = setTimeout(() => show(i + 1), BEATS[i][1] * 1000 + 1100);
}
document.getElementById("next").onclick = () => { show(i + 1); };
document.getElementById("prev").onclick = () => { show(i - 1); };
document.getElementById("restart").onclick = () => { show(0); };
document.getElementById("pause").onclick = (e) => {
  paused = !paused; e.target.textContent = paused ? "Play" : "Pause";
  if (!paused) show(i); else clearTimeout(timer);
};
if (reduced) document.getElementById("pause").textContent = "Play";
show(0);
</script>
</body>
</html>
